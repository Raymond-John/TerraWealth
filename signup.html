<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - TerraWealth Agro</title>
  <meta name="description" content="Create your TerraWealth Agro account and start investing in agricultural and real estate projects.">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Auth Page -->
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card" data-animate="animate-fadeInUp">
        <div class="auth-header">
          <a href="index.html" class="logo">
            <div class="logo-icon">🌿</div>
            <span>TerraWealth</span>
          </a>
          <h1 class="auth-title">Create Account</h1>
          <p class="auth-subtitle">Start your investment journey today</p>
        </div>
        
        <form id="signup-form">
          <div class="form-group">
            <label class="form-label" for="name">Full Name</label>
            <input type="text" id="name" name="name" class="form-input" placeholder="Enter your full name" required>
          </div>
          
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email" required>
          </div>
          
          <div class="form-group">
            <label class="form-label" for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" class="form-input" placeholder="Enter your phone number" required>
          </div>
          
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="Create a password (min 6 characters)" required>
            <p class="form-error" id="password-error" style="display: none;">Password must be at least 6 characters</p>
          </div>
          
          <div class="form-group">
            <label class="form-label" for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" name="confirm-password" class="form-input" placeholder="Confirm your password" required>
            <p class="form-error" id="confirm-error" style="display: none;">Passwords do not match</p>
          </div>
          
          <div class="form-group">
            <label style="display: flex; align-items: flex-start; gap: 0.5rem; cursor: pointer;">
              <input type="checkbox" id="terms" required style="width: 18px; height: 18px; margin-top: 2px;">
              <span style="font-size: 0.875rem; color: var(--text-light);">
                I agree to the <a href="#" style="color: var(--deep-green); font-weight: 600;">Terms of Service</a> 
                and <a href="#" style="color: var(--deep-green); font-weight: 600;">Privacy Policy</a>. 
                I understand that investments carry risk and returns are not guaranteed.
              </span>
            </label>
          </div>
          
          <button type="submit" class="btn btn-primary btn-full" style="margin-top: 1rem;">
            <span>Create Account</span>
            <span>→</span>
          </button>
        </form>
        
        <div class="auth-footer">
          <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
        
        <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--light-gray); text-align: center;">
          <a href="index.html" style="font-size: 0.875rem; color: var(--text-light);">← Back to Home</a>
        </div>
      </div>
      
      <p style="text-align: center; margin-top: 1.5rem; color: rgba(255,255,255,0.7); font-size: 0.875rem;">
        <small>Returns are not guaranteed. All investments carry risk.</small>
      </p>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/auth.js"></script>
  <script src="js/wallet.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/investment.js"></script>
  <script src="js/main.js"></script>
  
  <script>
    // Check if already logged in
    const currentUser = getCurrentUser();
    if (currentUser) {
      // Redirect to dashboard
      window.location.href = 'dashboard.html';
    }
    
    // Signup form handling
    document.getElementById('signup-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const terms = document.getElementById('terms').checked;
      
      // Reset errors
      document.getElementById('password-error').style.display = 'none';
      document.getElementById('confirm-error').style.display = 'none';
      
      // Validate
      if (!name || !email || !phone || !password || !confirmPassword) {
        Toast.error('Please fill in all fields.');
        return;
      }
      
      if (!Validation.email(email)) {
        Toast.error('Please enter a valid email address.');
        return;
      }
      
      if (!Validation.password(password)) {
        document.getElementById('password-error').style.display = 'block';
        return;
      }
      
      if (password !== confirmPassword) {
        document.getElementById('confirm-error').style.display = 'block';
        return;
      }
      
      if (!terms) {
        Toast.error('Please agree to the Terms of Service and Privacy Policy.');
        return;
      }
      
      // Show loading
      const submitBtn = this.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner" style="width: 20px; height: 20px; border-width: 2px;"></span> Creating account...';
      
      // Simulate API call
      setTimeout(() => {
        const result = registerUser(name, email, phone, password);
        
        if (result.success) {
          Toast.success(result.message);
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1500);
        } else {
          Toast.error(result.message);
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
        }
      }, 1500);
    });
  </script>
</body>
</html>
